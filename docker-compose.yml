services:
  db:
    image: postgres:16
    container_name: database
    restart: unless-stopped

    environment:
      POSTGRES_USER: collectionbrainz
      POSTGRES_PASSWORD: collectionbrainz
      POSTGRES_DB: collectionbrainz

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  pgdata:
